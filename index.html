<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JobTracker India & AP 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .active-tab { border-bottom: 4px solid #4f46e5; color: #4f46e5; }
        .card-hover:hover { transform: translateY(-8px); transition: 0.3s ease; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen font-sans">

    <header class="bg-white shadow-sm border-b sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-6 py-4 flex justify-between items-center">
            <div class="flex items-center gap-2">
                <div class="bg-indigo-600 p-2 rounded-lg text-white">
                    <i data-lucide="briefcase"></i>
                </div>
                <h1 class="text-2xl font-black text-slate-800 tracking-tight">Govt<span class="text-indigo-600">Sync</span></h1>
            </div>
            <div class="hidden md:flex gap-6 text-sm font-bold text-slate-500">
                <button onclick="showSection('central')" class="tab-btn active-tab pb-1" id="tab-central">Central Jobs</button>
                <button onclick="showSection('andhra')" class="tab-btn pb-1" id="tab-andhra">Andhra Pradesh</button>
            </div>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-6 py-10">
        
        <div id="central-section">
            <h2 class="text-2xl font-bold mb-6 text-slate-800 flex items-center gap-2">
                <i data-lucide="globe" class="text-indigo-500"></i> All India Notifications
            </h2>
            <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-6">
                <div class="card-hover bg-white p-6 rounded-3xl border border-slate-200 shadow-sm">
                    <span class="text-[10px] font-bold bg-blue-100 text-blue-600 px-2 py-1 rounded mb-4 inline-block">UPSC</span>
                    <h3 class="text-lg font-bold text-slate-900">Civil Services 2026</h3>
                    <p class="text-slate-500 text-sm mt-2 font-semibold">Exam: May 24, 2026</p>
                    <a href="https://upsc.gov.in" class="mt-4 block text-center py-2 bg-slate-100 rounded-xl text-sm font-bold hover:bg-indigo-600 hover:text-white transition">Details</a>
                </div>
                <div class="card-hover bg-white p-6 rounded-3xl border border-slate-200 shadow-sm">
                    <span class="text-[10px] font-bold bg-green-100 text-green-600 px-2 py-1 rounded mb-4 inline-block">RAILWAYS</span>
                    <h3 class="text-lg font-bold text-slate-900">RRB NTPC (Graduate)</h3>
                    <p class="text-slate-500 text-sm mt-2 font-semibold">Exam: March 16–27, 2026</p>
                    <a href="#" class="mt-4 block text-center py-2 bg-slate-100 rounded-xl text-sm font-bold hover:bg-indigo-600 hover:text-white transition">Details</a>
                </div>
            </div>
        </div>

        <div id="andhra-section" class="hidden">
            <h2 class="text-2xl font-bold mb-6 text-slate-800 flex items-center gap-2">
                <i data-lucide="map-pin" class="text-orange-500"></i> AP Government Jobs
            </h2>
            <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-6">
                <div class="card-hover bg-white p-6 rounded-3xl border border-orange-100 shadow-sm">
                    <span class="text-[10px] font-bold bg-orange-100 text-orange-600 px-2 py-1 rounded mb-4 inline-block">APPSC</span>
                    <h3 class="text-lg font-bold text-slate-900">AP DSC Teacher Recruitment</h3>
                    <p class="text-slate-500 text-sm mt-2 font-semibold">Exam: May 2026 (Tentative)</p>
                    <a href="https://psc.ap.gov.in" class="mt-4 block text-center py-2 bg-orange-50 rounded-xl text-sm font-bold text-orange-600 hover:bg-orange-600 hover:text-white transition">Visit
