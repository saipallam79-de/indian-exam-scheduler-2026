<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ExamTracker India 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .glass { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(10px); }
        .exam-card:hover { transform: translateY(-5px); transition: all 0.3s ease; }
    </style>
</head>
<body class="bg-gradient-to-br from-slate-50 to-indigo-50 min-h-screen">

    <nav class="glass sticky top-0 z-50 border-b border-indigo-100 p-4">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-2">
                <i data-lucide="calendar-check" class="text-indigo-600"></i>
                <h1 class="text-xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-indigo-600 to-purple-600">
                    SarkariPortal 2026
                </h1>
            </div>
            <span class="text-xs font-semibold bg-green-100 text-green-700 px-3 py-1 rounded-full animate-pulse">
                ● AI-Updated: Live
            </span>
        </div>
    </nav>

    <header class="max-w-6xl mx-auto py-12 px-6 text-center">
        <h2 class="text-4xl md:text-5xl font-extrabold text-slate-800 mb-4">Focus on Prep, <span class="text-indigo-600">We'll Track the Dates.</span></h2>
        <p class="text-slate-600 text-lg max-w-2xl mx-auto">The smartest exam calendar for UPSC, SSC, Banking, and Railways.</p>
    </header>

    <section class="max-w-6xl mx-auto px-6 mb-8">
        <div class="flex flex-wrap gap-4 justify-center">
            <button class="bg-indigo-600 text-white px-6 py-2 rounded-full shadow-lg">All Exams</button>
            <button class="bg-white text-slate-600 px-6 py-2 rounded-full border hover:border-indigo-400">UPSC</button>
            <button class="bg-white text-slate-600 px-6 py-2 rounded-full border hover:border-indigo-400">SSC</button>
            <button class="bg-white text-slate-600 px-6 py-2 rounded-full border hover:border-indigo-400">Banking</button>
        </div>
    </section>

    <main class="max-w-6xl mx-auto px-6 grid md:grid-cols-2 lg:grid-cols-3 gap-8 pb-20" id="exam-grid">
        <div class="exam-card bg-white rounded-3xl p-6 shadow-xl border border-slate-100 relative overflow-hidden">
            <div class="absolute top-0 right-0 p-4"><i data-lucide="bookmark" class="text-slate-300"></i></div>
            <span class="inline-block px-3 py-1 bg-orange-100 text-orange-600 text-xs font-bold rounded-lg mb-4">UPSC</span>
            <h3 class="text-xl font-bold text-slate-800 mb-1">Civil Services 2026</h3>
            <p class="text-slate-500 text-sm mb-6 font-medium">Preliminary Examination</p>
            
            <div class="space-y-3 mb-6">
                <div class="flex items-center gap-3 text-sm text-slate-600">
                    <i data-lucide="bell" class="w-4 h-4 text-indigo-500"></i>
                    <span>Notify: Feb 4, 2026</span>
                </div>
                <div class="flex items-center gap-3 text-sm text-slate-600">
                    <i data-lucide="clock" class="w-4 h-4 text-indigo-500"></i>
                    <span class="font-bold text-slate-800 underline decoration-indigo-300">Exam: May 24, 2026</span>
                </div>
            </div>

            <a href="https://upsc.gov.in" class="block text-center w-full bg-slate-900 text-white py-3 rounded-xl font-semibold hover:bg-indigo-600 transition">
                Apply Official
            </a>
        </div>
        
        </main>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
